name: Daily Auction Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Chrome for Selenium
        run: |
          google-chrome --version
          chromedriver --version || true

      - name: Create data directories
        run: |
          mkdir -p data/raw data/processed

      - name: Run scrapers
        id: run_scrapers
        run: |
          python run_scrapers.py 2>&1 | tee /tmp/scraper_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true
        timeout-minutes: 45

      - name: Generate job summary
        if: always()
        run: |
          echo "## Scraper Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/scraper_output.txt ]; then
            echo "### Results" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "(FINAL SUMMARY|: [0-9]+ items$|TOTAL:|ERROR:|WARNING:)" /tmp/scraper_output.txt | tail -30 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate static site for Tiiny deployment
        run: |
          python generate_static_site.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Update auction data [skip ci]"
          git push
